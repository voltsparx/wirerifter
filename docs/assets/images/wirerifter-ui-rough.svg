<svg xmlns="http://www.w3.org/2000/svg" width="420" height="900" viewBox="0 0 420 900" role="img" aria-label="Rough WireRifter UI mockup">
  <defs>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b12"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="420" height="900" fill="#11151f"/>
  <rect x="34" y="26" width="352" height="848" rx="34" fill="#05070c" stroke="#242b3a" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="48" y="46" width="324" height="808" rx="24" fill="url(#screenGlow)"/>

  <g transform="translate(68 72)">
    <rect x="0" y="0" width="40" height="40" rx="11" fill="#151a25" stroke="#273145"/>
    <path d="M12 28 L20 8 L28 28 Z" fill="none" stroke="#617fd0" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="20" cy="22" r="4" fill="#f8faff"/>
    <text x="54" y="18" fill="#f8faff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">WireRifter</text>
    <text x="54" y="35" fill="#a8b0c2" font-family="Consolas, monospace" font-size="10">SSID: Lab_AP (wlan0)</text>
    <circle cx="276" cy="20" r="18" fill="#151a25"/>
    <path d="M270 20 h12 M276 14 v12" stroke="#617fd0" stroke-width="2" stroke-linecap="round"/>
  </g>

  <line x1="64" y1="132" x2="356" y2="132" stroke="#222837"/>

  <g transform="translate(68 154)">
    <text x="0" y="0" fill="#f8faff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Live Monitor</text>
    <text x="0" y="18" fill="#a8b0c2" font-family="Consolas, monospace" font-size="10">packet feed, query bar, inspector</text>
    <rect x="218" y="-20" width="72" height="32" rx="10" fill="#617fd0"/>
    <text x="239" y="1" fill="#05070c" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">START</text>
  </g>

  <g transform="translate(68 200)">
    <rect x="0" y="0" width="284" height="46" rx="13" fill="#0d1018" stroke="#222837"/>
    <text x="16" y="20" fill="#617fd0" font-family="Consolas, monospace" font-size="11">filter: tcp.port == 443</text>
    <text x="16" y="34" fill="#a8b0c2" font-family="Consolas, monospace" font-size="9">query packets without hiding raw evidence</text>
  </g>

  <g transform="translate(68 268)">
    <rect x="0" y="0" width="86" height="70" rx="14" fill="#0d1018" stroke="#222837"/>
    <text x="12" y="22" fill="#a8b0c2" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">PACKETS</text>
    <text x="12" y="50" fill="#f8faff" font-family="Consolas, monospace" font-size="24" font-weight="700">248</text>
    <rect x="99" y="0" width="86" height="70" rx="14" fill="#0d1018" stroke="#222837"/>
    <text x="111" y="22" fill="#a8b0c2" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">DEVICES</text>
    <text x="111" y="50" fill="#f8faff" font-family="Consolas, monospace" font-size="24" font-weight="700">14</text>
    <rect x="198" y="0" width="86" height="70" rx="14" fill="#0d1018" stroke="#44232d"/>
    <text x="210" y="22" fill="#a8b0c2" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">ALERTS</text>
    <text x="210" y="50" fill="#ff4d67" font-family="Consolas, monospace" font-size="24" font-weight="700">03</text>
  </g>

  <g transform="translate(68 362)">
    <rect x="0" y="0" width="284" height="236" rx="16" fill="#0d1018" stroke="#222837"/>
    <text x="16" y="26" fill="#f8faff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Packet Feed</text>
    <g font-family="Consolas, monospace" font-size="10">
      <rect x="14" y="44" width="256" height="34" rx="8" fill="#151a25"/>
      <text x="26" y="64" fill="#58f29a">TLS</text>
      <text x="66" y="64" fill="#f8faff">192.168.1.105 -> 142.250.72.110</text>
      <rect x="14" y="86" width="256" height="34" rx="8" fill="#151a25"/>
      <text x="26" y="106" fill="#617fd0">DNS</text>
      <text x="66" y="106" fill="#f8faff">192.168.1.105 -> 1.1.1.1</text>
      <rect x="14" y="128" width="256" height="34" rx="8" fill="#24141b"/>
      <text x="26" y="148" fill="#ff4d67">TCP</text>
      <text x="66" y="148" fill="#f8faff">192.168.1.199 -> local:445</text>
      <rect x="14" y="170" width="256" height="46" rx="8" fill="#10141d" stroke="#617fd0" stroke-opacity="0.45"/>
      <text x="26" y="190" fill="#ffc15a">INSPECT</text>
      <text x="88" y="190" fill="#f8faff">flags=SYN scan_score=82</text>
      <text x="26" y="207" fill="#a8b0c2">payload hex, headers, entropy, warnings</text>
    </g>
  </g>

  <g transform="translate(68 620)">
    <rect x="0" y="0" width="284" height="104" rx="16" fill="#0d1018" stroke="#222837"/>
    <text x="16" y="26" fill="#f8faff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Stats Snapshot</text>
    <rect x="16" y="44" width="252" height="8" rx="4" fill="#05070c"/>
    <rect x="16" y="44" width="178" height="8" rx="4" fill="#617fd0"/>
    <text x="16" y="72" fill="#a8b0c2" font-family="Consolas, monospace" font-size="10">Top talker: 192.168.1.199</text>
    <text x="16" y="88" fill="#ffc15a" font-family="Consolas, monospace" font-size="10">Scan sense: tcp-syn-fin-collision</text>
  </g>

  <g transform="translate(60 766)">
    <rect x="0" y="0" width="300" height="66" rx="28" fill="#0d1018" stroke="#222837"/>
    <g font-family="Inter, Arial, sans-serif" font-size="8" font-weight="700" text-anchor="middle">
      <g transform="translate(28 16)">
        <rect x="-18" y="-5" width="36" height="24" rx="12" fill="#617fd0" fill-opacity="0.18"/>
        <circle cx="0" cy="7" r="6" fill="#617fd0"/>
        <text x="0" y="42" fill="#f8faff">Monitor</text>
      </g>
      <g transform="translate(78 16)">
        <circle cx="0" cy="7" r="6" fill="#a8b0c2"/>
        <text x="0" y="42" fill="#a8b0c2">Devices</text>
      </g>
      <g transform="translate(128 16)">
        <circle cx="0" cy="7" r="6" fill="#a8b0c2"/>
        <text x="0" y="42" fill="#a8b0c2">Analysis</text>
      </g>
      <g transform="translate(178 16)">
        <circle cx="0" cy="7" r="6" fill="#a8b0c2"/>
        <text x="0" y="42" fill="#a8b0c2">Stats</text>
      </g>
      <g transform="translate(228 16)">
        <circle cx="0" cy="7" r="6" fill="#a8b0c2"/>
        <text x="0" y="42" fill="#a8b0c2">Terminal</text>
      </g>
      <g transform="translate(276 16)">
        <circle cx="0" cy="7" r="6" fill="#a8b0c2"/>
        <text x="0" y="42" fill="#a8b0c2">Vault</text>
      </g>
    </g>
  </g>
</svg>
